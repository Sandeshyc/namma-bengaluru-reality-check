name: Supabase Keep-Alive Cron

on:
  schedule:
    # Runs every 5 days at midnight UTC to prevent the 7-day auto-pause on free tier
    - cron: '0 0 */5 * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API (via Backend Health Endpoint)
        run: |
          curl -f -X GET "${{ secrets.BACKEND_URL }}/api/health" || echo "Backend failed, trying Supabase directly"
          curl -f -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" || exit 1
